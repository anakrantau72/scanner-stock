<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Frestive Inventory</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
  --primary:#2196F3;
  --success:#4CAF50;
  --bg:#f4f6f9;
}

body{
  font-family:'Segoe UI',Arial;
  background:var(--bg);
  margin:0;
  padding:10px;
}

.header{
  background:var(--primary);
  color:white;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  text-align:center;
}

.box{
  background:white;
  padding:20px;
  border-radius:15px;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:15px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:10px;
  box-sizing:border-box;
  font-size:16px;
}

button{
  width:100%;
  background:var(--primary);
  color:white;
  border:none;
  padding:15px;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

.btn-alt{
  background:#6c757d;
  margin-top:5px;
}

.barcode-container{
  position:relative;
}

#barcode{
  padding-right:50px;
}

.cam-icon{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:24px;
}

.nav-tabs{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.nav-tabs button{
  flex:1;
  padding:10px;
  font-size:14px;
  background:white;
  color:var(--primary);
  border:1px solid var(--primary);
}

.nav-tabs button.active{
  background:var(--primary);
  color:white;
}

#reader{
  width:100%;
  border-radius:12px;
  overflow:hidden;
  border:2px solid var(--primary);
  display:none;
  margin-bottom:15px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

th,td{
  border:1px solid #ddd;
  padding:12px;
  text-align:left;
}

th{
  background:var(--primary);
  color:white;
}

#appPage,
#masterSection{
  display:none;
}
</style>
</head>

<body>

<div id="loginPage">
  <div class="header">
    <h1>Frestive Inventory</h1>
    <p>Silahkan Login</p>
  </div>

  <div class="box">
    <input type="text" id="namaUser" placeholder="Nama Penginput">
    <input type="text" id="lokasi" placeholder="No Lokasi">
    <button onclick="loginApp()">LOGIN</button>
  </div>
</div>

<div id="appPage">

  <div class="header">
    <h2 id="showUser"></h2>
    <small id="showLokasi"></small>
    <br><br>
    <button onclick="logoutApp()" class="btn-alt">Logout</button>
  </div>

  <div class="nav-tabs">
    <button id="tabIn" class="active" onclick="switchTab('input')">Input Barang</button>
    <button id="tabMas" onclick="switchTab('master')">Master Item</button>
  </div>

  <div id="inputSection">

    <div class="box">

      <h3>Scan / Input Barcode</h3>

      <div id="reader"></div>

      <div class="barcode-container">
        <input type="text" id="barcode" placeholder="Barcode">
        <span class="cam-icon" onclick="startScanner()">📷</span>
      </div>

      <input type="text" id="namaBarang" placeholder="Nama Barang" readonly style="background:#eee">
      <input type="number" id="qty" placeholder="Qty">

      <button onclick="simpan()" style="background:var(--success)">
        SIMPAN
      </button>

    </div>
  </div>

  <div id="masterSection">

    <div class="box">
      <input type="text" id="searchInput"
             placeholder="Cari Barang..."
             onkeyup="filterMaster()">
    </div>

    <div class="box" style="overflow-x:auto">

      <table>
        <thead>
          <tr>
            <th>Barcode</th>
            <th>Nama Barang</th>
            <th>SOH</th>
          </tr>
        </thead>

        <tbody id="masterBody"></tbody>

      </table>

    </div>
  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyLaSUtKO969XJHOjHxiPa2eK2dMkf97vOdIfxpm6FTo4jFmlZeJk2m0TUGHWYZS9pe/exec";

let html5QrCode;
let masterDataCache = [];

function loginApp(){

  const u = document.getElementById('namaUser').value;
  const l = document.getElementById('lokasi').value;

  if(!u || !l){
    alert("Isi Nama & Lokasi");
    return;
  }

  localStorage.setItem('namaUser', u);
  localStorage.setItem('lokasi', l);

  showApp();
}

function showApp(){

  const u = localStorage.getItem('namaUser');
  const l = localStorage.getItem('lokasi');

  if(!u) return;

  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';

  document.getElementById('showUser').innerText = u;
  document.getElementById('showLokasi').innerText = "Lokasi : " + l;

  loadMaster();
}

function logoutApp(){
  localStorage.clear();
  location.reload();
}

function switchTab(tab){

  document.getElementById('inputSection').style.display =
    tab === 'input' ? 'block' : 'none';

  document.getElementById('masterSection').style.display =
    tab === 'master' ? 'block' : 'none';

  document.getElementById('tabIn').classList.toggle('active', tab === 'input');
  document.getElementById('tabMas').classList.toggle('active', tab === 'master');

  stopScanner();

  if(tab === 'master'){
    loadMaster();
  }
}

async function startScanner(){

  const readerDiv = document.getElementById('reader');

  if(html5QrCode){
    try{
      await html5QrCode.stop();
    }catch(e){}
  }

  readerDiv.style.display = 'block';

  html5QrCode = new Html5Qrcode("reader");

  try{

    await html5QrCode.start(
      { facingMode: "environment" },
      {
        fps:10,
        qrbox:{ width:250, height:150 }
      },

      async(decodedText)=>{

        document.getElementById('barcode').value = decodedText;

        stopScanner();

        cariBarang();
      }

    );

  }catch(err){

    console.log(err);

    Swal.fire({
      icon:'error',
      title:'Kamera Gagal',
      text:'Pastikan pakai Chrome Android dan izinkan kamera'
    });

    readerDiv.style.display = 'none';
  }
}

async function stopScanner(){

  const readerDiv = document.getElementById('reader');

  if(html5QrCode){

    try{
      await html5QrCode.stop();
      await html5QrCode.clear();
    }catch(e){}

    readerDiv.style.display = 'none';
  }
}

async function cariBarang(){

  const bc = document.getElementById('barcode').value;

  if(!bc) return;

  try{

    const res = await fetch(API_URL + "?action=getBarang&barcode=" + bc);

    const data = await res.json();

    document.getElementById('namaBarang').value =
      data.nama || 'Tidak ditemukan';

  }catch(err){

    console.log(err);
  }
}

async function simpan(){

  const bc = document.getElementById('barcode').value;
  const namaBarang = document.getElementById('namaBarang').value;
  const qty = document.getElementById('qty').value;

  if(!bc || !qty){

    Swal.fire({
      icon:'warning',
      title:'Oops',
      text:'Barcode & Qty wajib diisi'
    });

    return;
  }

  Swal.fire({
    title:'Menyimpan...',
    allowOutsideClick:false,
    didOpen:()=>{
      Swal.showLoading();
    }
  });

  try{

    const response = await fetch(API_URL,{

      method:'POST',

      body:JSON.stringify({

        namaUser:localStorage.getItem('namaUser'),
        lokasi:localStorage.getItem('lokasi'),
        barcode:bc,
        namaBarang:namaBarang,
        qty:qty

      })

    });

    const result = await response.json();

    Swal.fire({
      icon:'success',
      title:'Berhasil',
      text:'Data berhasil disimpan'
    });

    document.getElementById('barcode').value = '';
    document.getElementById('namaBarang').value = '';
    document.getElementById('qty').value = '';

  }catch(err){

    Swal.fire({
      icon:'error',
      title:'Gagal',
      text:'Tidak bisa menyimpan data'
    });

    console.log(err);
  }
}

async function loadMaster(){

  try{

    const res = await fetch(API_URL + "?action=getMaster");

    const data = await res.json();

    masterDataCache = data;

    renderTable(data);

  }catch(err){

    console.log(err);
  }
}

function renderTable(data) {
  let html = '';
  if (!data || data.length === 0) {
    html = '<tr><td colspan="4" style="text-align:center">Data tidak ditemukan</td></tr>';
  } else {
    data.forEach(function(row){
      // row[0] = Barcode, row[1] = Nama, row[2] = SOH, row[3] = Satuan
      html += `<tr>
                <td>${row[0]}</td>
                <td>${row[1]}</td>
                <td>${row[2]} ${row[3]}</td> 
               </tr>`;
    });
  }
  document.getElementById('masterBody').innerHTML = html;
}

function filterMaster(){

  const keyword =
    document.getElementById('searchInput').value.toLowerCase();

  const filtered = masterDataCache.filter(row=>
    row[0].toString().toLowerCase().includes(keyword) ||
    row[1].toString().toLowerCase().includes(keyword)
  );

  renderTable(filtered);
}

showApp();

</script>

</body>
</html>
